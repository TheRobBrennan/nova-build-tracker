name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  validate-pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Check semantic commit prefix
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          echo "PR title: $TITLE"
          if ! echo "$TITLE" | grep -qE "^(feat|feat!|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .+"; then
            echo "ERROR: PR title must follow Conventional Commits format"
            echo "Examples: 'feat: add component export', 'fix: correct subscription teardown'"
            exit 1
          fi

  typecheck-api:
    name: TypeScript — API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: services/api
      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: services/api

  typecheck-web:
    name: TypeScript — Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: services/web

  build-web:
    name: Build — Web
    runs-on: ubuntu-latest
    needs: typecheck-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Vite production build
        run: npm run build
        working-directory: services/web

  test-api:
    name: Tests — API
    runs-on: ubuntu-latest
    needs: typecheck-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: services/api
      - name: Run unit tests
        run: npm test
        working-directory: services/api

  docker-build:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build all images
        run: docker compose build
