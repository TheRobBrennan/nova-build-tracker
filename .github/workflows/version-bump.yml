name: Version Bump

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Default to cleanup containers on workflow completion
env:
  ACT_STOPPED_CONTAINER_RM: true  # Automatically remove stopped containers
  ACT_FORCE_TERM: true             # Force terminate containers on SIGTERM

jobs:
  version-bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Configure Git for GitHub Actions
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Determine Version Bump Type
        id: bump-type
        run: |
          COMMIT_MESSAGE="${{ github.event.head_commit.message }}"
          echo "Commit message: $COMMIT_MESSAGE"
          
          if [[ "$COMMIT_MESSAGE" =~ feat!: || "$COMMIT_MESSAGE" =~ fix!: || "$COMMIT_MESSAGE" =~ refactor!: ]]; then
            echo "bump_type=major" >> $GITHUB_OUTPUT
          elif [[ "$COMMIT_MESSAGE" =~ feat: ]]; then
            echo "bump_type=minor" >> $GITHUB_OUTPUT
          else
            echo "bump_type=patch" >> $GITHUB_OUTPUT
          fi
          
          echo "Determined bump type: $(cat $GITHUB_OUTPUT | grep bump_type | cut -d'=' -f2)"
          
      - name: Detect Changed Services
        id: changed-services
        run: |
          # Get the previous commit hash
          PREVIOUS_COMMIT=$(git rev-parse HEAD~1)
          echo "Previous commit: $PREVIOUS_COMMIT"
          
          # Check which services have changed
          CHANGED_SERVICES=()
          
          # Check API service changes
          if git diff --name-only $PREVIOUS_COMMIT HEAD | grep -q "^services/api/"; then
            CHANGED_SERVICES+=("api")
            echo "API service has changes"
          fi
          
          # Check web service changes
          if git diff --name-only $PREVIOUS_COMMIT HEAD | grep -q "^services/web/"; then
            CHANGED_SERVICES+=("web")
            echo "Web service has changes"
          fi
          
          # Always include root package.json
          CHANGED_SERVICES+=("root")
          echo "Root package.json always updated"
          
          SERVICES=$(IFS=','; echo "${CHANGED_SERVICES[*]}")
          echo "changed_services=$SERVICES" >> $GITHUB_OUTPUT
          echo "Changed services: $SERVICES"
          
      - name: Update Versions and Commit
        run: |
          echo "Starting version bump process..."
          echo "Bump type: ${{ steps.bump-type.outputs.bump_type }}"
          echo "Changed services: ${{ steps.changed-services.outputs.changed_services }}"
          
          # Update version in root package.json
          echo "Updating root package.json..."
          npm version ${{ steps.bump-type.outputs.bump_type }} --no-git-tag-version
          
          # Update versions in changed services
          IFS=',' read -ra SERVICES <<< "${{ steps.changed-services.outputs.changed_services }}"
          for SERVICE in "${SERVICES[@]}"; do
            if [[ "$SERVICE" == "api" ]]; then
              echo "Updating API service version..."
              cd services/api
              npm version ${{ steps.bump-type.outputs.bump_type }} --no-git-tag-version
              cd ../..
            elif [[ "$SERVICE" == "web" ]]; then
              echo "Updating web service version..."
              cd services/web
              npm version ${{ steps.bump-type.outputs.bump_type }} --no-git-tag-version
              cd ../..
            fi
          done
          
          # Show what changed
          echo "Version changes made:"
          git diff package.json services/*/package.json || true
          
          # Commit version changes directly to main
          git add package.json services/*/package.json
          git commit -m "chore: version bump ${{ steps.bump-type.outputs.bump_type }} [skip ci]"
          
          # Push changes directly to main
          git push origin main
          
          echo "Version bump completed and pushed to main!"

  cleanup:
    needs: version-bump
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup Docker containers
        run: |
          # List and remove any running act containers
          docker ps -a --filter "name=act-*" --format "{{.ID}}" | xargs -r docker rm -f || true
          
          # Remove any dangling containers
          docker container prune -f
          
          # Remove any dangling images
          docker image prune -f
